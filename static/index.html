<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>农业植保助手</title>
<style>
  :root {
    --green: #07c160; --green-dark: #06ad56; --bg: #f5f5f5; --white: #fff;
    --text: #333; --text2: #999; --border: #e5e5e5; --radius: 10px;
    --sidebar-width: 280px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: var(--bg); min-height: 100vh; min-height: 100dvh;
    display: flex; flex-direction: column;
    max-width: 500px; margin: 0 auto;
  }

  /* ===== Header ===== */
  .header {
    background: var(--green); color: #fff; padding: 12px 16px;
    padding-top: max(12px, env(safe-area-inset-top));
    text-align: center; font-size: 17px; font-weight: 600;
    position: sticky; top: 0; z-index: 20; flex-shrink: 0;
  }
  .header .status { font-size: 11px; opacity: 0.8; font-weight: 400; margin-top: 2px; }
  .hdr-btn {
    position: absolute; top: 50%; transform: translateY(-50%);
    font-size: 22px; cursor: pointer; width: 36px; height: 36px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 50%; border: none; background: rgba(255,255,255,0.15); color: #fff;
    transition: background 0.15s;
  }
  .hdr-btn:hover { background: rgba(255,255,255,0.25); }
  .hdr-btn:active { background: rgba(255,255,255,0.35); }
  #btnList { left: 10px; }
  #btnNewC { right: 10px; }

  /* ===== App Body ===== */
  .app-body {
    flex: 1 1 auto; display: flex; flex-direction: column;
    position: relative; min-height: 0;
  }
  .overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.4); z-index: 50;
  }
  .overlay.show { display: block; }

  /* ===== 侧边栏 ===== */
  .panel {
    position: fixed; top: 0; left: 0; bottom: 0;
    width: var(--sidebar-width); max-width: 80vw;
    z-index: 51; background: #fff;
    transform: translateX(-100%); transition: transform 0.25s ease;
    display: flex; flex-direction: column;
    box-shadow: 2px 0 12px rgba(0,0,0,0.15);
  }
  .panel.show { transform: translateX(0); }
  .panel-head {
    padding: 16px; border-bottom: 1px solid #eee;
    display: flex; justify-content: space-between; align-items: center; flex-shrink: 0;
  }
  .panel-head .close { font-size: 18px; cursor: pointer; color: #999; padding: 4px; }
  .panel-head .close:hover { color: #333; }
  .conv-list { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
  .conv-item {
    display: flex; align-items: center; padding: 14px 16px;
    border-bottom: 1px solid #f0f0f0; cursor: pointer; gap: 10px;
    transition: background 0.15s;
  }
  .conv-item:hover { background: #f9f9f9; }
  .conv-item:active { background: #f0f0f0; }
  .conv-item.active { background: #e8f5e9; border-left: 3px solid var(--green); }
  .conv-info { flex: 1; min-width: 0; }
  .conv-title {
    font-size: 14px; color: #333;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .conv-date { font-size: 11px; color: #999; margin-top: 2px; }
  .conv-del {
    width: 28px; height: 28px; border-radius: 50%; border: none;
    background: transparent; color: #ccc; font-size: 16px; cursor: pointer;
    flex-shrink: 0; display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .conv-del:hover { background: #fee; color: #e74c3c; }
  .conv-empty { text-align: center; padding: 40px 20px; color: #999; font-size: 13px; }

  /* ===== 主内容区 ===== */
  .main-area {
    flex: 1 1 auto; display: flex; flex-direction: column;
    min-width: 0; min-height: 0;
  }

  /* ===== 聊天区 ===== */
  .chat {
    flex: 1 1 auto; overflow-y: auto; padding: 12px;
    display: flex; flex-direction: column; gap: 10px;
    -webkit-overflow-scrolling: touch; min-height: 0;
  }
  .msg { display: flex; gap: 8px; max-width: 90%; animation: up 0.3s ease; }
  @keyframes up { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg.bot { align-self: flex-start; }
  .msg .avatar {
    width: 36px; height: 36px; border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; flex-shrink: 0;
  }
  .msg.user .avatar { background: var(--green); }
  .msg.bot .avatar { background: #e8f5e9; }
  .msg .bubble {
    padding: 10px 14px; border-radius: 4px;
    font-size: var(--fs, 15px); line-height: 1.6; word-break: break-word;
  }

  body.font-l { --fs: 17px; }
  body.font-l .msg .bubble { font-size: 17px; }
  body.font-l .input-wrap input { font-size: 17px; }
  body.font-l .conv-title { font-size: 16px; }
  body.font-xl { --fs: 20px; }
  body.font-xl .msg .bubble { font-size: 20px; }
  body.font-xl .input-wrap input { font-size: 20px; }
  body.font-xl .conv-title { font-size: 18px; }

  .msg.user .bubble { background: var(--green); color: #fff; border-top-right-radius: 2px; }
  .msg.bot .bubble {
    background: var(--white); border-top-left-radius: 2px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.06);
  }
  .bubble .title { font-size: 16px; font-weight: 600; margin-bottom: 6px; color: var(--green); }
  .bubble img { max-width: 200px; border-radius: 6px; margin: 4px 0; }

  .typing { display: flex; gap: 4px; padding: 6px 0; }
  .typing span {
    width: 7px; height: 7px; background: #ccc; border-radius: 50%;
    animation: dot 1.4s infinite;
  }
  .typing span:nth-child(2){animation-delay:0.2s} .typing span:nth-child(3){animation-delay:0.4s}
  @keyframes dot { 0%,60%,100%{opacity:.3;transform:translateY(0)} 30%{opacity:1;transform:translateY(-4px)} }

  .actions {
    background: var(--white); border-top: 1px solid var(--border);
    padding: 10px 12px;
    padding-bottom: max(10px, env(safe-area-inset-bottom));
    display: flex; gap: 8px; align-items: center;
    flex-shrink: 0; position: sticky; bottom: 0; z-index: 10;
  }
  .btn-camera {
    width: 44px; height: 44px; border-radius: 50%;
    background: var(--bg); border: none; font-size: 22px; cursor: pointer;
    flex-shrink: 0; display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
  }
  .btn-camera:hover { background: #e8e8e8; }
  .btn-camera:active { background: #ddd; }
  .btn-camera.has-photo { background: #fff3cd; }
  /* 语音按钮（大按钮，按住说话） */
  .voice-hold-btn {
    display: none;
    flex: 1; min-height: 40px; border-radius: 6px;
    background: #f0f0f0; color: #666; border: none;
    font-size: 15px; cursor: pointer; font-family: inherit;
    align-items: center; justify-content: center; gap: 8px;
    user-select: none; -webkit-user-select: none;
    transition: all 0.15s;
  }
  .voice-hold-btn.show { display: flex; }
  .voice-hold-btn .hold-icon { font-size: 20px; }
  .voice-hold-btn.recording {
    background: #e74c3c; color: #fff;
    animation: micPulse 1s infinite;
  }
  .voice-hold-btn .hold-timer { font-size: 13px; margin-left: 4px; display: none; }
  .voice-hold-btn.recording .hold-timer { display: inline; }
  /* 模式切换按钮 */
  .btn-mode-toggle {
    width: 44px; height: 44px; border-radius: 50%;
    background: var(--bg); border: none; font-size: 20px; cursor: pointer;
    flex-shrink: 0; display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .btn-mode-toggle:hover { background: #e8e8e8; }
  .btn-mode-toggle:active { background: #ddd; }
  .btn-mode-toggle.voice-mode { background: #e8f5e9; color: var(--green); }
  /* 输入框隐藏 */
  .input-wrap.hidden { display: none; }
  /* 发送按钮隐藏 */
  .btn-send.hidden { display: none; }
  /* 麦克风按钮（已废弃，改用模式切换） */
  .btn-mic { display: none; }
  .input-wrap {
    flex: 1; display: flex; align-items: center;
    background: var(--bg); border-radius: 6px; padding: 0 12px; min-height: 40px;
    transition: background 0.15s;
  }
  .input-wrap:focus-within { background: #ebebeb; }
  .input-wrap input {
    flex: 1; border: none; background: none;
    font-size: 15px; outline: none; padding: 8px 0; font-family: inherit;
  }
  .input-wrap input::placeholder { color: #bbb; }
  /* 照片预览条（输入框上方） */
  .photo-preview {
    display: flex; align-items: center; gap: 6px;
    background: var(--white); border-top: 1px solid var(--border);
    padding: 8px 12px; flex-shrink: 0;
  }
  .photo-preview img { object-fit: cover; }
  .photo-badge {
    display: none; align-items: center; gap: 4px;
    background: var(--green); color: #fff; padding: 2px 8px;
    border-radius: 10px; font-size: 11px; margin-right: 6px; white-space: nowrap;
    animation: up 0.2s ease;
  }
  .photo-badge.show { display: flex; }
  .photo-badge .del { margin-left: 2px; cursor: pointer; font-size: 14px; opacity: 0.8; }
  .photo-badge .del:hover { opacity: 1; }
  .btn-send {
    width: 44px; height: 44px; border-radius: 50%;
    background: var(--green); color: #fff; border: none;
    font-size: 18px; cursor: pointer; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s, transform 0.15s;
  }
  .btn-send:hover { background: var(--green-dark); }
  .btn-send:active { transform: scale(0.95); }

  .welcome { text-align: center; padding: 30px 10px; }
  .welcome .icon { font-size: 56px; margin-bottom: 16px; }
  .welcome h2 { font-size: 19px; color: #333; margin-bottom: 6px; }
  .welcome p { font-size: 13px; color: #999; line-height: 1.6; }
  .welcome .tips { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin-top: 16px; }
  .welcome .tip {
    background: #e8f5e9; color: var(--green);
    padding: 6px 12px; border-radius: 14px; font-size: 12px;
    cursor: pointer; transition: all 0.15s;
  }
  .welcome .tip:hover { background: #c8e6c9; }

  /* 连接状态提示 */
  .conn-status {
    position: fixed; top: 0; left: 0; right: 0;
    text-align: center; padding: 4px; font-size: 11px;
    z-index: 100; display: none;
  }
  .conn-status.error { display: block; background: #fff3cd; color: #856404; }

  #cameraInput { position: fixed; top: -100px; left: -100px; opacity: 0.01; width: 1px; height: 1px; }
  /* 首次进入取名弹窗 */
  .name-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100;
    display: flex; align-items: center; justify-content: center;
  }
  .name-card {
    background: #fff; border-radius: 14px; padding: 32px 24px;
    width: 90%; max-width: 360px; text-align: center;
    animation: up 0.3s ease;
  }
  .name-card .name-icon { font-size: 48px; margin-bottom: 12px; }
  .name-card h3 { font-size: 18px; margin-bottom: 6px; color: #333; }
  .name-card p { font-size: 13px; color: #999; margin-bottom: 20px; }
  .name-card input {
    width: 100%; padding: 12px 14px; border: 1px solid #ddd;
    border-radius: 8px; font-size: 16px; text-align: center;
    font-family: inherit; outline: none; margin-bottom: 16px;
  }
  .name-card input:focus { border-color: var(--green); }
  .name-card button {
    width: 100%; padding: 12px; background: var(--green);
    color: #fff; border: none; border-radius: 8px;
    font-size: 16px; cursor: pointer; font-family: inherit;
  }
  .name-card button:active { background: var(--green-dark); }
  /* 摄像头拍照弹窗 */
  .camera-modal {
    display: none; position: fixed; inset: 0; background: #000; z-index: 90;
    flex-direction: column; align-items: center; justify-content: center;
  }
  .camera-modal.show { display: flex; }
  .camera-modal video { max-width: 100%; max-height: 70vh; border-radius: 8px; }
  .camera-modal .cam-close {
    position: absolute; top: 16px; right: 16px; width: 40px; height: 40px;
    border-radius: 50%; background: rgba(255,255,255,0.2); color: #fff;
    border: none; font-size: 20px; cursor: pointer; z-index: 2;
  }
  .camera-modal .cam-capture {
    width: 64px; height: 64px; border-radius: 50%;
    background: #fff; border: 4px solid rgba(255,255,255,0.3);
    cursor: pointer; margin-top: 20px; transition: transform 0.15s;
  }
  .camera-modal .cam-capture:active { transform: scale(0.9); }
  .camera-modal .cam-flip {
    position: absolute; bottom: 40px; right: 24px; background: rgba(255,255,255,0.2);
    color: #fff; border: none; padding: 8px 16px; border-radius: 20px;
    font-size: 14px; cursor: pointer;
  }
  /* 拍照选择弹窗 */
  .photo-picker-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.3); z-index: 80;
    justify-content: center; align-items: flex-end;
  }
  .photo-picker-overlay.show { display: flex; }
  .photo-picker-sheet {
    background: #fff; border-radius: 14px 14px 0 0;
    width: 100%; max-width: 500px; padding: 8px 0 20px;
    animation: slideUp 0.2s ease;
  }
  @keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
  .photo-picker-sheet .pick-item {
    display: flex; align-items: center; gap: 12px;
    padding: 16px 20px; font-size: 16px; cursor: pointer;
    border: none; background: none; width: 100%; text-align: left;
    font-family: inherit; transition: background 0.15s;
  }
  .photo-picker-sheet .pick-item:hover { background: #f5f5f5; }
  .photo-picker-sheet .pick-item:active { background: #eee; }
  .photo-picker-sheet .pick-item .pick-icon { font-size: 22px; width: 28px; text-align: center; }
  .photo-picker-sheet .pick-cancel {
    display: block; width: calc(100% - 32px); margin: 8px 16px 0;
    padding: 12px; border-radius: 10px; background: #f5f5f5;
    border: none; font-size: 16px; cursor: pointer; font-family: inherit;
    color: #666; text-align: center;
  }
  .photo-picker-sheet .pick-cancel:active { background: #e8e8e8; }

  /* ===== 桌面端响应式（≥768px）===== */
  @media (min-width: 768px) {
    body { max-width: none; margin: 0; height: 100vh; height: 100dvh; }
    .header { padding: 14px 20px; font-size: 18px; }
    .app-body { flex-direction: row; overflow: hidden; }
    .overlay { display: none !important; }
    .panel {
      position: relative; top: auto; left: auto; bottom: auto;
      width: var(--sidebar-width); max-width: none;
      transform: none; z-index: 5; box-shadow: none;
      border-right: 1px solid var(--border);
      transition: width 0.3s ease, opacity 0.3s ease, border 0.3s ease;
      flex-shrink: 0;
    }
    body.sidebar-hidden .panel {
      width: 0; overflow: hidden; opacity: 0;
      pointer-events: none; border-right: none;
    }
    body.sidebar-hidden #btnList { background: rgba(255,255,255,0.3); }
    .main-area { flex: 1 1 auto; }
    .chat { padding: 16px 24px; }
    .msg { max-width: 65%; }
    .welcome { padding: 60px 40px; }
    .welcome .icon { font-size: 72px; }
    .welcome h2 { font-size: 22px; }
    .welcome p { font-size: 15px; }
    .actions { padding: 12px 24px; }
    .input-wrap { min-height: 44px; }
  }

  @media (min-width: 1200px) {
    :root { --sidebar-width: 320px; }
    .chat { padding: 20px 40px; }
    .msg { max-width: 55%; }
    .actions { padding: 14px 40px; }
  }
</style>
</head>
<body>

<!-- 登录/注册弹窗 -->
<div class="name-overlay" id="nameOverlay">
  <div class="name-card">
    <div class="name-icon">🌾</div>
    <h3 id="nameTitle">登录农业助手</h3>
    <p id="nameHint">输入你的名字进入系统</p>
    <input type="text" id="nameInput" placeholder="请输入你的名字" autocomplete="off">
    <div id="nameError" style="color:#e74c3c;font-size:13px;margin-bottom:12px;display:none;"></div>
    <div id="nameBtns" style="display:flex;gap:8px;">
      <button id="nameLogin" style="flex:1;">登录</button>
      <button id="nameRegister" style="flex:1;background:#fff;color:var(--green);border:1px solid var(--green);">注册</button>
    </div>
    <button id="nameBack" style="display:none;margin-top:8px;background:#fff;color:#999;border:1px solid #ddd;">返回登录</button>
    <button id="nameGuest" style="width:100%;margin-top:12px;padding:10px;background:#ffe0ec;color:#e8558d;border:1px solid #f9c0d4;border-radius:8px;font-size:15px;cursor:pointer;font-family:inherit;">不登录，直接试用（对话不保存）</button>
  </div>
</div>

<div class="header">
  <button class="hdr-btn" id="btnList" title="切换侧边栏">☰</button>
  农业植保助手
  <button class="hdr-btn" id="btnNewC" title="新建对话">+</button>
  <button class="hdr-btn" id="btnFont" style="right:52px;font-size:14px;" title="切换字号">Aa</button>
  <div class="status">🌾 拍照识别 · 语音输入 · AI 在线诊断</div>
</div>

<div class="conn-status" id="connStatus"></div>

<div class="app-body">
  <div class="overlay" id="overlay"></div>
  <div class="panel" id="panel">
    <div class="panel-head">
      <span style="font-weight:600;font-size:16px;">💬 对话列表</span>
      <span class="close" id="btnClose" title="关闭">✕</span>
    </div>
    <div style="padding:12px 16px;border-bottom:1px solid #eee;display:flex;gap:8px;align-items:center;">
      <span style="font-size:13px;color:#999;white-space:nowrap;">👤 昵称</span>
      <input type="text" id="nicknameInput" placeholder="输入昵称区分身份" style="flex:1;border:1px solid #e0e0e0;border-radius:6px;padding:6px 10px;font-size:13px;font-family:inherit;outline:none;">
      <button id="nicknameSave" style="background:var(--green);color:#fff;border:none;border-radius:6px;padding:6px 12px;font-size:12px;cursor:pointer;white-space:nowrap;">确认</button>
    </div>
    <div class="conv-list" id="convList"></div>
  </div>

  <div class="main-area">
    <div class="chat" id="chat">
      <div class="welcome">
        <div class="icon">🌾</div>
        <h2>农业植保助手</h2>
        <p>拍张照片，告诉我作物怎么了<br>AI 帮您识别病虫害、推荐防治方案</p>
        <div class="tips">
          <span class="tip">📷 拍照诊断</span><span class="tip">🎤 语音输入</span>
          <span class="tip">🐛 病虫害识别</span><span class="tip">🧪 农药配比</span><span class="tip">🌱 种植指导</span>
        </div>
      </div>
    </div>
    <!-- 照片预览条 -->
    <div class="photo-preview" id="photoPreview" style="display:none">
      <img id="photoPreviewImg" src="" style="max-height:80px;border-radius:6px;">
      <span style="font-size:13px;color:#666;margin-left:8px;">已选照片</span>
      <button id="delPhotoPreview" style="margin-left:auto;background:none;border:none;font-size:18px;cursor:pointer;color:#999;">×</button>
    </div>
    <div class="actions">
      <button class="btn-camera" id="btnCamera" title="拍照">📷</button>
      <input type="file" id="cameraInput" accept="image/*">
      <div class="input-wrap" id="textInputWrap">
        <input type="text" id="msgInput" placeholder="描述问题，或直接发照片...">
      </div>
      <button class="voice-hold-btn" id="voiceHoldBtn">
        <span class="hold-icon">🎤</span>
        <span class="hold-text">按住说话 松开发送</span>
        <span class="hold-timer" id="holdTimer">0s</span>
      </button>
      <button class="btn-mode-toggle" id="btnModeToggle" title="切换语音输入">🎤</button>
      <button class="btn-send" id="btnSend">➤</button>
    </div>
    <!-- 摄像头拍照弹窗（桌面端） -->
    <div class="camera-modal" id="cameraModal">
      <button class="cam-close" id="camClose">✕</button>
      <video id="camVideo" autoplay playsinline></video>
      <button class="cam-capture" id="camCapture" title="拍照"></button>
      <button class="cam-flip" id="camFlip" style="display:none">切换摄像头</button>
    </div>
    <canvas id="camCanvas" style="display:none"></canvas>
    <!-- 拍照方式选择弹窗 -->
    <div class="photo-picker-overlay" id="photoPickerOverlay">
      <div class="photo-picker-sheet">
        <button class="pick-item" id="pickCamera">
          <span class="pick-icon">📸</span><span>拍照</span>
        </button>
        <button class="pick-item" id="pickGallery">
          <span class="pick-icon">🖼️</span><span>从相册选择</span>
        </button>
        <button class="pick-cancel" id="pickCancel">取消</button>
      </div>
    </div>
  </div>
</div>

<script>
// ===================================================================
// 用户身份（昵称即 ID，换设备输入相同昵称即可找回对话）
// ===================================================================
var USER_NAME = localStorage.getItem('agri_nickname') || '';
var USER_ID = USER_NAME || '';
var nameOverlay = document.getElementById('nameOverlay');
var nameInput = document.getElementById('nameInput');
var nameTitle = document.getElementById('nameTitle');
var nameHint = document.getElementById('nameHint');
var nameError = document.getElementById('nameError');
var nameBtns = document.getElementById('nameBtns');
var nameLogin = document.getElementById('nameLogin');
var nameRegister = document.getElementById('nameRegister');
var nameBack = document.getElementById('nameBack');
var registerMode = false;

function enterApp(name) {
  USER_NAME = name;
  USER_ID = name;
  localStorage.setItem('agri_nickname', name);
  document.getElementById('nicknameInput').value = name;
  nameOverlay.style.display = 'none';
  loadConversations();
  msgInput.focus();
}

function handleLogin() {
  var name = nameInput.value.trim();
  if (!name) { showError('请输入名字'); return; }
  nameError.style.display = 'none';

  fetch('/api/user-exists?user_id=' + encodeURIComponent(name))
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.exists) {
        enterApp(name);
      } else {
        showError('用户不存在，请先注册');
      }
    });
}

function handleRegister() {
  var name = nameInput.value.trim();
  if (!name) { showError('请输入名字'); return; }
  nameError.style.display = 'none';

  fetch('/api/register?user_id=' + encodeURIComponent(name), { method: 'POST' })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.ok) {
        // 注册成功 → 回到登录界面
        setLoginMode();
        nameHint.textContent = '注册成功！请输入名字登录';
        nameInput.value = name;
      }
    }).catch(function(e) {
      showError('注册失败，名字可能已被占用');
    });
}

function showError(msg) {
  nameError.textContent = msg;
  nameError.style.display = 'block';
}

function setLoginMode() {
  registerMode = false;
  nameTitle.textContent = '登录农业助手';
  nameHint.textContent = '输入你的名字进入系统';
  nameBtns.style.display = 'flex';
  nameBack.style.display = 'none';
  nameError.style.display = 'none';
}

function setRegisterMode() {
  registerMode = true;
  nameTitle.textContent = '注册新用户';
  nameHint.textContent = '输入你的名字完成注册';
  nameBtns.style.display = 'none';
  nameBack.style.display = 'block';
  nameError.style.display = 'none';
}

// 弹窗事件
nameInput.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    if (registerMode) handleRegister();
    else handleLogin();

});
nameLogin.addEventListener('click', handleLogin);
nameRegister.addEventListener('click', setRegisterMode);
nameBack.addEventListener('click', setLoginMode);

function checkConnection() {
  API.health().then(function(data) {
    if (!data.api_key_configured) {
      connStatus.className = 'conn-status error';
      connStatus.textContent = '⚠️ API Key 未配置，请编辑 .env 文件填入 DASHSCOPE_API_KEY';
      connStatus.style.display = 'block';
    } else {
      connStatus.className = 'conn-status';
      connStatus.style.display = 'none';
    }
  }).catch(function() {
    connStatus.className = 'conn-status error';
    connStatus.textContent = '⚠️ 无法连接后端服务，请确认已启动 python app.py';
  });
}

// ===================================================================
function loadConversations() {
  API.listConversations().then(function(data) {
    conversations = data || [];
    if (conversations.length === 0) {
      // 自动创建第一个对话
      API.createConversation('新对话').then(function(conv) {
        conversations = [conv];
        currentConvId = conv.id;
        renderConvList();
        renderCurrentChat();
      });
    } else {
      currentConvId = currentConvId || conversations[0].id;
      // 验证当前对话是否存在
      var found = conversations.find(function(c){return c.id === currentConvId;});
      if (!found) currentConvId = conversations[0].id;
      renderConvList();
      renderCurrentChat();
    }
  }).catch(function(e) {
    checkConnection();
  });
}

function saveConversations() {
  // 后端自动保存，前端只需刷新列表
  API.listConversations().then(function(data) {
    conversations = data || [];
    renderConvList();
  });
}

function getCurrentConv() {
  return conversations.find(function(c){return c.id===currentConvId}) || null;
}

function createConversation() {
  API.createConversation('新对话').then(function(conv) {
    conversations.unshift(conv);
    currentConvId = conv.id;
    renderConvList();
    renderCurrentChat();
    msgInput.value = '';
    msgInput.focus();
  });
}

function deleteConversation(id) {
  API.deleteConversation(id).then(function() {
    conversations = conversations.filter(function(c){return c.id!==id;});
    if (currentConvId === id) currentConvId = conversations.length > 0 ? conversations[0].id : null;
    if (!currentConvId) {
      API.createConversation('新对话').then(function(conv) {
        conversations = [conv];
        currentConvId = conv.id;
        renderConvList();
        renderCurrentChat();
      });
    } else {
      renderConvList();
      renderCurrentChat();
    }
  });
}

function switchToConv(id) {
  currentConvId = id;
  renderConvList();
  renderCurrentChat();
}

function formatDate(iso) {
  var d = new Date(iso);
  var now = new Date();
  var diff = now - d;
  if (diff < 60000) return '刚刚';
  if (diff < 3600000) return Math.floor(diff/60000)+'分钟前';
  if (diff < 86400000) return Math.floor(diff/3600000)+'小时前';
  return (d.getMonth()+1)+'/'+d.getDate()+' '+d.getHours()+':'+String(d.getMinutes()).padStart(2,'0');
}

function renderConvList() {
  if (!convList) return;
  if (conversations.length === 0) {
    convList.innerHTML = '<div class="conv-empty">还没有对话<br>点击右上角 + 开始</div>';
    return;
  }
  var html = '';
  conversations.forEach(function(c){
    var active = c.id === currentConvId ? ' active' : '';
    var title = (c.title || '新对话').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    html += '<div class="conv-item'+active+'" data-id="'+c.id+'"><div class="conv-info"><div class="conv-title">'+title+'</div><div class="conv-date">'+formatDate(c.created_at)+' · '+c.message_count+'条消息</div></div><button class="conv-del" data-del="'+c.id+'">×</button></div>';
  });
  convList.innerHTML = html;

  convList.querySelectorAll('.conv-item').forEach(function(item){
    item.addEventListener('click', function(e){
      if (e.target.classList.contains('conv-del')) return;
      var id = this.getAttribute('data-id');
      switchToConv(id);
      if (!isDesktop()) closePanel();
    });
  });

  convList.querySelectorAll('.conv-del').forEach(function(btn){
    btn.addEventListener('click', function(e){
      e.stopPropagation();
      var id = this.getAttribute('data-del');
      if (confirm('确定删除这个对话吗？')) {
        deleteConversation(id);
      }
    });
  });
}

function renderCurrentChat() {
  chat.innerHTML = '';
  var conv = getCurrentConv();
  if (!conv || conv.message_count === 0) {
    chat.innerHTML = WELCOME;
    return;
  }
  // 从后端加载完整对话
  API.getConversation(currentConvId).then(function(full) {
    var messages = full.messages || [];
    if (messages.length === 0) {
      chat.innerHTML = WELCOME;
      return;
    }
    chat.innerHTML = '';
    messages.forEach(function(msg){
      var role = msg.role === 'user' ? 'user' : 'bot';
      var avatar = role === 'user' ? '👨‍🌾' : '🌾';
      var content = typeof msg.content === 'string' ? msg.content : '';

function renderText(text) {
  if (!text) return '';
  return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\n\n/g,'<br><br>').replace(/\n/g,'<br>').replace(/^[#]+ (.+)$/gm,'<div class="title">$1</div>').replace(/^[-•] (.+)$/gm,'· $1<br>');
}

function handlePhoto(file) {
  if (file.size > 10*1024*1024) { alert('图片太大了，不要超过10M'); return; }
  var reader = new FileReader();
  reader.onload = function(){
    var img = new Image();
    img.onload = function(){
      var canvas = document.createElement('canvas');
      var MAX = 800;
      var w = img.width, h = img.height;
      if (w > h) { if(w>MAX){h=h*MAX/w;w=MAX;} } else { if(h>MAX){w=w*MAX/h;h=MAX;} }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      photoBase64 = canvas.toDataURL('image/jpeg', 0.7);
      photoFile = file;
      photoPreview.style.display = 'flex';
      photoPreviewImg.src = photoBase64;
      btnCamera.classList.add('has-photo');
      msgInput.placeholder = '描述一下照片里的情况（可选）...';
      msgInput.focus();
    };
    img.src = reader.result;
  };
  reader.readAsDataURL(file);
}

function clearPhoto() {
  photoFile = null; photoBase64 = null;
  photoPreview.style.display = 'none';
  photoPreviewImg.src = '';
  btnCamera.classList.remove('has-photo');
  cameraInput.value = '';
  msgInput.placeholder = '描述问题，或直接发照片...';
}

// ===================================================================
// 流式聊天（调用后端 /api/chat）
// ===================================================================
async function* callBackendStream(userText, photoData, signal) {
  var body = {
    user_id: USER_ID,
    conversation_id: currentConvId,
    message: userText,
  };
  if (photoData) {
    body.image = photoData;
  }

  var resp = await fetch('/api/chat', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(body),
    signal: signal,
  });

  if (!resp.ok) {
    var errText = '';
    try { errText = await resp.text(); } catch(e){}
    throw new Error('服务繁忙，请稍后再试（'+resp.status+'）');
  }

  var reader = resp.body.getReader();
  var decoder = new TextDecoder();
  var buffer = '', full = '';

  while (true) {
    if (signal && signal.aborted) { reader.cancel(); yield { full: full, stopped: true }; return; }
    var doneVal = await reader.read();
    if (doneVal.done) break;
    buffer += decoder.decode(doneVal.value, {stream: true});
    var lines = buffer.split('\n');
    buffer = lines.pop() || '';
    for (var i = 0; i < lines.length; i++) {
      var t = lines[i].trim();
      if (!t.startsWith('data:')) continue;
      var data = t.slice(5).trim();
      if (data === '[DONE]') {
        // 刷新对话列表以更新标题
        saveConversations();
        return full;
      }
      try {
        var d = JSON.parse(data);
        if (d.error) {
          throw new Error(d.error);
        }
        var delta = d.choices[0].delta.content;
        if (delta) { full += delta; yield { full: full, stopped: false }; }
      } catch(e) {
        if (e.message && !e.message.includes('choices')) throw e;
      }
    }
  }
  saveConversations();
  return full;
}

function addMsg(role, html) {

  div.className = 'msg '+role;

function addTyping() {
  var div = document.createElement('div');
  div.className = 'msg bot';
  div.id = 'typing';
  div.innerHTML = '<div class="avatar">🌾</div><div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>';
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function rmTyping() { var el = document.getElementById('typing'); if(el) el.remove(); }

async function send() {
  var text = msgInput.value.trim();
  if (!text && !photoBase64) return;
  if (isWorking) return;

  isWorking = true;
  btnSend.textContent = '⏹';
  btnSend.style.background = '#e74c3c';

  var userHtml = '';
  if (photoBase64) userHtml += '<img src="'+photoBase64+'" style="max-width:160px;border-radius:4px;display:block;margin-bottom:6px;">';
  if (text) userHtml += text.replace(/&/g,'&amp;').replace(/</g,'&lt;');
  addMsg('user', userHtml);

  var sendText = text;
  msgInput.value = '';
  var photoData = photoBase64;
  clearPhoto();

  abortCtrl = new AbortController();
  addTyping();

  var first = true, botBub = null, lastFull = '';

  try {
    var gen = callBackendStream(sendText || '请帮我看看这张作物照片', photoData, abortCtrl.signal);
    while (true) {
      var result = await gen.next();
      if (result.done) break;
      var chunk = result.value;
      if (chunk.stopped) break;
      lastFull = chunk.full;
      if (first) {
        rmTyping();
        var bdiv = document.createElement('div');
        bdiv.className = 'msg bot';
        bdiv.innerHTML = '<div class="avatar">🌾</div>';
        botBub = document.createElement('div');
        botBub.className = 'bubble';
        bdiv.appendChild(botBub);
        chat.appendChild(bdiv);
        first = false;
      }
      botBub.innerHTML = renderText(chunk.full);
      chat.scrollTop = chat.scrollHeight;
    }
  } catch(e) {
    if (e.name === 'AbortError') {
      rmTyping();
      if (botBub && lastFull) {
        botBub.innerHTML = renderText(lastFull) + '<br><span style="color:#999;font-size:12px;">（已停止）</span>';
      }
    } else {
      rmTyping();
      addMsg('bot', '<span style="color:#e74c3c;">😅 '+e.message.replace(/</g,'&lt;')+'</span><br><br>请稍后再试，或联系技术人员。');
    }
  }

  if (first) rmTyping();
  isWorking = false;
  abortCtrl = null;
  btnSend.textContent = '➤';
  btnSend.style.background = '';
}

// ===================================================================
// 语音识别 — 按住说话，松开发送（类似微信）
// ===================================================================
var SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
var recognition = null;
var mediaRecorder = null;
var audioChunks = [];
var isVoiceMode = false;
var isRecording = false;
var voiceTimer = null;
var voiceSeconds = 0;
var voiceTranscript = '';
var VOICE_MAX = 60;
var VOICE_LOCAL = false;       // 本地识别模式（Chrome/Edge）
var VOICE_SERVER = false;      // 服务端识别模式（全浏览器）

function initSpeech() {
  // 方案1：浏览器本地 SpeechRecognition（零延迟）
  if (SpeechRecognition) {
    try {
      recognition = new SpeechRecognition();
      recognition.lang = 'zh-CN';
      recognition.interimResults = true;
      recognition.continuous = true;
      recognition.onresult = function(e) {
        var t = '';
        for (var i = 0; i < e.results.length; i++) t += e.results[i][0].transcript;
        voiceTranscript = t;
        if (t) voiceHoldBtn.querySelector('.hold-text').textContent = t.length > 16 ? '...' + t.slice(-16) : t;
      };
      recognition.onerror = function(e) {
        if (e.error === 'not-allowed') alert('请允许麦克风权限');
        else if (e.error === 'no-speech') return;
        stopRecording(true);
      };
      recognition.onend = function() {
        if (isRecording) setTimeout(function() {
          if (isRecording) try { recognition.start(); } catch(e) {}
        }, 80);
      };
      VOICE_LOCAL = true;
      console.log('[语音] 本地识别模式（零延迟）');
      return true;
    } catch(e) {}
  }
  // 方案2：服务端 MediaRecorder（Firefox/Safari 等）
  if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
    VOICE_SERVER = true;
    console.log('[语音] 服务端识别模式（全浏览器兼容）');
    return true;
  }
  console.log('[语音] 不支持');
  return false;
}

function toggleInputMode() {
  if (!VOICE_LOCAL && !VOICE_SERVER && !initSpeech()) {
    alert('语音功能不可用');
    return;
  }
  if (!VOICE_LOCAL && !VOICE_SERVER) initSpeech();

  isVoiceMode = !isVoiceMode;
  if (isVoiceMode) {
    textInputWrap.classList.add('hidden');
    voiceHoldBtn.classList.add('show');
    btnSend.classList.add('hidden');
    btnModeToggle.textContent = '⌨️';
    btnModeToggle.classList.add('voice-mode');
  } else {
    textInputWrap.classList.remove('hidden');
    voiceHoldBtn.classList.remove('show');
    btnSend.classList.remove('hidden');
    btnModeToggle.textContent = '🎤';
    btnModeToggle.classList.remove('voice-mode');
    msgInput.focus();
  }
}

function startRecording() {
  if (isRecording) return;
  if (!VOICE_LOCAL && !VOICE_SERVER && !initSpeech()) { alert('语音不可用'); return; }
  isRecording = true;
  voiceTranscript = '';
  voiceSeconds = 0;
  voiceHoldBtn.classList.add('recording');
  holdTimer.textContent = '0s';

  if (VOICE_LOCAL) {
    voiceHoldBtn.querySelector('.hold-text').textContent = '正在聆听...';
    try { recognition.start(); } catch(e) { stopRecording(true); alert('麦克风启动失败'); return; }
  } else {
    voiceHoldBtn.querySelector('.hold-text').textContent = '正在录音...';
    audioChunks = [];
    navigator.mediaDevices.getUserMedia({ audio: true }).then(function(stream) {
      mediaRecorder = new MediaRecorder(stream);
      mediaRecorder.ondataavailable = function(e) { if (e.data.size > 0) audioChunks.push(e.data); };
      mediaRecorder.onstop = function() { stream.getTracks().forEach(function(t) { t.stop(); }); };
      mediaRecorder.start();
    }).catch(function() { stopRecording(true); alert('无法访问麦克风'); });
  }

  voiceTimer = setInterval(function() {
    voiceSeconds++;
    holdTimer.textContent = voiceSeconds + 's';
    if (voiceSeconds >= VOICE_MAX) stopRecording(false);
  }, 1000);
}

function stopRecording(cancel) {
  if (!isRecording) return;
  isRecording = false;
  if (voiceTimer) { clearInterval(voiceTimer); voiceTimer = null; }
  voiceHoldBtn.classList.remove('recording');
  holdTimer.textContent = '';

  if (VOICE_SERVER && mediaRecorder && mediaRecorder.state !== 'inactive') {
    voiceHoldBtn.querySelector('.hold-text').textContent = '识别中...';
    mediaRecorder.onstop = function() {
      if (cancel || audioChunks.length === 0) { resetVoiceBtn(); return; }
      var blob = new Blob(audioChunks);
      var reader = new FileReader();
      reader.onload = function() {
        fetch('/api/speech-recognize', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ audio: reader.result.split(',')[1] }),
        }).then(function(r) { return r.json(); }).then(function(data) {
          voiceTranscript = data.text || '';
          resetVoiceBtn();
          if (voiceTranscript.trim()) { msgInput.value = voiceTranscript.trim(); send(); }
          else { voiceHoldBtn.querySelector('.hold-text').textContent = '未识别到语音'; }
        }).catch(function() { resetVoiceBtn(); });
      };
      reader.readAsDataURL(blob);
    };
    mediaRecorder.stop();
    return;
  }

  // 本地模式
  try { recognition.stop(); } catch(e) {}
  resetVoiceBtn();
  if (!cancel && voiceTranscript.trim()) { msgInput.value = voiceTranscript.trim(); send(); }
  else if (!cancel) { voiceHoldBtn.querySelector('.hold-text').textContent = '未识别到语音'; }
}

function resetVoiceBtn() {
  voiceHoldBtn.querySelector('.hold-text').textContent = '按住说话 松开发送';
  holdTimer.textContent = '';
}

// 事件绑定

document.getElementById('btnClose').addEventListener('click', closePanel);

  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});

// 拍照按钮 → 弹出选择弹窗
btnCamera.addEventListener('click', function(){
  photoPickerOverlay.classList.add('show');
});

// ── 摄像头操作 ──
function openCamera() {
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    // 不支持 getUserMedia（桌面旧浏览器或移动端），走 capture 文件选择
    cameraInput.setAttribute('capture', 'environment');
    cameraInput.click();
    return;
  }
  // 桌面端：打开摄像头弹窗
  cameraModal.classList.add('show');
  startCamera();
}

function startCamera() {
  var constraints = { video: { facingMode: camFacing, width: { ideal: 1280 }, height: { ideal: 720 } }, audio: false };
  navigator.mediaDevices.getUserMedia(constraints).then(function(stream) {
    camStream = stream;
    camVideo.srcObject = stream;
    camVideo.play();
  }).catch(function(e) {
    console.log('[摄像头] 失败:', e);
    cameraModal.classList.remove('show');
    // 回退到文件选择
    cameraInput.setAttribute('capture', 'environment');
    cameraInput.click();
  });
}

function stopCamera() {
  if (camStream) {
    camStream.getTracks().forEach(function(t) { t.stop(); });
    camStream = null;
  }
  camVideo.srcObject = null;
  cameraModal.classList.remove('show');
}

function capturePhoto() {
  if (!camStream) return;
  camCanvas.width = camVideo.videoWidth;
  camCanvas.height = camVideo.videoHeight;
  var ctx = camCanvas.getContext('2d');
  ctx.drawImage(camVideo, 0, 0);
  photoBase64 = camCanvas.toDataURL('image/jpeg', 0.8);
  photoFile = null;
  photoPreview.style.display = 'flex';
  photoPreviewImg.src = photoBase64;
  btnCamera.classList.add('has-photo');
  msgInput.placeholder = '描述一下照片里的情况（可选）...';
  msgInput.focus();
  stopCamera();
}

// 弹窗：拍照
document.getElementById('pickCamera').addEventListener('click', function(e){
  e.stopPropagation();
  photoPickerOverlay.classList.remove('show');
  setTimeout(function(){ openCamera(); }, 200);
});

// 弹窗：从相册选择
document.getElementById('pickGallery').addEventListener('click', function(e){
  e.stopPropagation();
  photoPickerOverlay.classList.remove('show');
  cameraInput.removeAttribute('capture');
  cameraInput.value = '';
  cameraInput.click();
});

// 摄像头弹窗：关闭
document.getElementById('camClose').addEventListener('click', stopCamera);
// 摄像头弹窗：拍照
document.getElementById('camCapture').addEventListener('click', capturePhoto);
// 摄像头弹窗：切换前后摄像头
document.getElementById('camFlip').addEventListener('click', function(){
  camFacing = camFacing === 'user' ? 'environment' : 'user';
  stopCamera();
  cameraModal.classList.add('show');

});

// 弹窗：取消
document.getElementById('pickCancel').addEventListener('click', function(){

});

// 点击遮罩关闭弹窗
photoPickerOverlay.addEventListener('click', function(e){

  }
});

// 模式切换按钮
btnModeToggle.addEventListener('click', toggleInputMode);

// 按住说话 — 鼠标
voiceHoldBtn.addEventListener('mousedown', function(e) { e.preventDefault(); startRecording(); });
voiceHoldBtn.addEventListener('mouseup', function(e) { e.preventDefault(); stopRecording(false); });
voiceHoldBtn.addEventListener('mouseleave', function(e) { if (isRecording) { e.preventDefault(); stopRecording(false); } });

// 按住说话 — 触摸（手机）
voiceHoldBtn.addEventListener('touchstart', function(e) { e.preventDefault(); startRecording(); });
voiceHoldBtn.addEventListener('touchend', function(e) { e.preventDefault(); stopRecording(false); });
voiceHoldBtn.addEventListener('touchcancel', function(e) { stopRecording(true); });

// 初始化语音，不支持则隐藏按钮
if (!initSpeech()) {
  btnModeToggle.style.display = 'none';
}
cameraInput.addEventListener('change', function(){
  if (cameraInput.files[0]) handlePhoto(cameraInput.files[0]);
});
delPhotoPreview.addEventListener('click', function(e){ e.stopPropagation(); clearPhoto(); });

// 窗口大小变化时清理手机端状态
var lastWasDesktop = isDesktop();
window.addEventListener('resize', function(){
  var nowDesktop = isDesktop();
  if (lastWasDesktop && !nowDesktop) {
    overlay.classList.remove('show');
    panel.classList.remove('show');
  }
  lastWasDesktop = nowDesktop;
});

// 初始化
// ===================================================================
if (isDesktop() && localStorage.getItem('agri_sidebar_hidden') === '1') {

}

  nameInput.focus();
}
